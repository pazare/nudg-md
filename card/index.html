<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NUDG MD — title card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0f1912; color: #f3ecd9;
    font-family: -apple-system, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { display: flex; align-items: center; gap: 7vw; padding: 4vh 6vw; }
  .word { font-size: 2.6vh; font-weight: 800; font-style: italic; letter-spacing: 0.14em; margin-bottom: 4.5vh; }
  .word span { font-style: normal; font-weight: 500; opacity: 0.75; }
  h1 {
    margin: 0 0 2.4vh; font-size: 6.4vh; line-height: 1.06; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.01em; max-width: 52vw;
  }
  .sub { font-size: 2.6vh; font-style: italic; color: #cfe3c8; margin: 0 0 5vh; }
  .foot { font-size: 1.9vh; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9fb59a; }
  .qrbox {
    background: #f3ecd9; border-radius: 2.4vh; padding: 2.6vh;
    display: flex; flex-direction: column; align-items: center; gap: 1.6vh;
  }
  .qrbox img { width: 34vh; height: 34vh; display: block; }
  .qrbox div { color: #0f1912; font-size: 1.9vh; font-weight: 700; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="word">&#10554; NUDG <span>MD</span></div>
      <h1>We don&rsquo;t replace doctors.<br>We give AI bounded work.</h1>
      <p class="sub">The system handles the legwork. The clinician owns the decision.</p>
      <div class="foot">Built today &middot; Public repo &middot; Deterministic core &middot; Labeled AI lanes &middot; Synthetic data</div>
    </div>
    <div class="qrbox">
      <img src="qr.svg" alt="QR code linking to github.com/pazare/nudg-md">
      <div>github.com/pazare/nudg-md</div>
    </div>
  </div>
</body>
</html>
